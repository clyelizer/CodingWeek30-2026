<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Appendicite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: url('/static/background_image.jpg') no-repeat center center fixed; background-size: cover; }
        .card { background-color: rgba(255, 255, 255, 0.95); }
    </style>
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4">
                <div class="card-header bg-primary text-white text-center">
                    <img src="/static/ecole.png" alt="Logo École" class="img-fluid mb-3" style="max-height: 80px;">
                    <h3>Diagnostic Appendicite</h3>
                </div>
                <div class="card-body">
                    <form action="/predict" method="post">
                        <div class="mb-3">
                            <label for="age" class="form-label">Âge (ans)</label>
                            <input type="number" id="age" name="age" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="wbc" class="form-label">Globules Blancs (WBC)</label>
                            <input type="number" id="wbc" name="wbc" step="0.1" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="temp" class="form-label">Température (°C)</label>
                            <input type="number" id="temp" name="temp" step="0.1" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Analyser le risque</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
