<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Appendicite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Arrière-plan de l'application */
        body {
            background: url('/static/background_image.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        /* Transparence pour que la carte soit lisible sur le fond */
        .card { background-color: rgba(255, 255, 255, 0.95); }
    </style>
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4">
                <div class="card-header bg-primary text-white text-center">
                    <img src="/static/ecole.png" alt="Logo École" class="img-fluid mb-3" style="max-height: 80px;">
                    <h3 class="mb-0">Diagnostic Appendicite</h3>
                </div>
                <div class="card-body">
                    <form action="/predict" method="post">
                        <div class="mb-3">
                            <label class="form-label">Âge (ans)</label>
                            <input type="number" name="age" class="form-control" placeholder="Ex: 10" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Globules Blancs (WBC)</label>
                            <input type="number" step="0.1" name="wbc" class="form-control" placeholder="Ex: 12.5" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Température (°C)</label>
                            <input type="number" step="0.1" name="temp" class="form-control" placeholder="Ex: 38.5" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Analyser le risque</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
