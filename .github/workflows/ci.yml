name: CI

# Run CI on pushes and PRs for all branches (features + main).
on:
  push: {}
  pull_request: {}

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install coverage plugin
        run: |
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          pytest -q --cov=src --cov-report=xml

      - name: Upload coverage (optional)
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker image build & smoke test
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pediappendix:latest .

      - name: Smoke test container
        run: |
          docker run -d --name pediappendix -p 8000:8000 pediappendix:latest
          sleep 10
          curl --fail http://localhost:8000/ || (docker logs pediappendix && exit 1)
          docker stop pediappendix
